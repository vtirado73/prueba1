<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Pro</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,Arial,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    radial-gradient(circle at top,#1d3557,#0a0f1f 70%);
    color:white;
}

.container{
    display:flex;
    gap:25px;
    flex-wrap:wrap;
    justify-content:center;
    padding:20px;
}

.panel{
    width:250px;
}

.card{
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.1);
    border-radius:16px;
    padding:18px;
    margin-bottom:18px;
    backdrop-filter:blur(10px);
}

.title{
    text-align:center;
    font-size:34px;
    color:#4cc9f0;
    margin-bottom:15px;
    text-shadow:0 0 15px #4cc9f0;
}

.card h2{
    color:#4cc9f0;
    margin-bottom:10px;
}

.stat{
    display:flex;
    justify-content:space-between;
    margin:10px 0;
    font-size:18px;
}

canvas{
    background:#081018;
    border:3px solid #4cc9f0;
    border-radius:14px;
    box-shadow:
    0 0 25px #4cc9f0,
    inset 0 0 20px rgba(76,201,240,.15);
}

.controls{
    line-height:1.9;
}

.overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.85);
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    border-radius:14px;
}

.overlay h1{
    font-size:42px;
    color:#ff4d6d;
    margin-bottom:20px;
}

button{
    border:none;
    background:#4cc9f0;
    color:#081018;
    padding:12px 24px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
    font-size:16px;
}

button:hover{
    transform:scale(1.05);
}

.game-container{
    position:relative;
}

@media(max-width:800px){
    .container{
        flex-direction:column;
        align-items:center;
    }
}
</style>
</head>
<body>

<div class="container">

    <div class="game-container">

        <canvas id="game" width="600" height="600"></canvas>

        <div class="overlay" id="gameOver">
            <h1>GAME OVER</h1>
            <button onclick="restartGame()">
                Reiniciar
            </button>
        </div>

    </div>

    <div class="panel">

        <div class="title">SNAKE</div>

        <div class="card">
            <h2>Estadísticas</h2>

            <div class="stat">
                <span>Puntos</span>
                <span id="score">0</span>
            </div>

            <div class="stat">
                <span>Récord</span>
                <span id="best">0</span>
            </div>

            <div class="stat">
                <span>Velocidad</span>
                <span id="speed">1</span>
            </div>
        </div>

        <div class="card controls">
            <h2>Controles</h2>

            ↑ Arriba<br>
            ↓ Abajo<br>
            ← Izquierda<br>
            → Derecha<br>
            P = Pausa
        </div>

    </div>

</div>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const scoreEl = document.getElementById("score");
const bestEl = document.getElementById("best");
const speedEl = document.getElementById("speed");

const gridSize = 30;
const tileCount = canvas.width / gridSize;

let snake;
let food;
let dx;
let dy;
let score;
let gameSpeed;
let paused;
let gameEnded;

let bestScore =
parseInt(localStorage.getItem("snake_best")) || 0;

bestEl.textContent = bestScore;

function resetGame(){

    snake = [
        {x:10,y:10}
    ];

    dx = 1;
    dy = 0;

    score = 0;
    gameSpeed = 120;

    paused = false;
    gameEnded = false;

    generateFood();

    updateStats();

    document.getElementById(
        "gameOver"
    ).style.display = "none";
}

function generateFood(){

    food = {
        x: Math.floor(Math.random()*tileCount),
        y: Math.floor(Math.random()*tileCount)
    };

    for(const segment of snake){

        if(
            segment.x===food.x &&
            segment.y===food.y
        ){
            generateFood();
            return;
        }
    }
}

function updateStats(){

    scoreEl.textContent = score;

    speedEl.textContent =
    Math.floor(
        (120 - gameSpeed)/8 + 1
    );
}

function drawBackground(){

    ctx.fillStyle="#081018";
    ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    for(let y=0;y<tileCount;y++){

        for(let x=0;x<tileCount;x++){

            ctx.strokeStyle =
            "rgba(255,255,255,.03)";

            ctx.strokeRect(
                x*gridSize,
                y*gridSize,
                gridSize,
                gridSize
            );
        }
    }
}

function drawFood(){

    ctx.fillStyle="#ff4d6d";

    ctx.beginPath();

    ctx.arc(
        food.x*gridSize+15,
        food.y*gridSize+15,
        12,
        0,
        Math.PI*2
    );

    ctx.fill();
}

function drawSnake(){

    snake.forEach((part,index)=>{

        if(index===0){

            ctx.fillStyle="#00f5d4";

        }else{

            ctx.fillStyle="#38bdf8";
        }

        ctx.fillRect(
            part.x*gridSize+2,
            part.y*gridSize+2,
            gridSize-4,
            gridSize-4
        );
    });
}

function moveSnake(){

    const head = {
        x: snake[0].x + dx,
        y: snake[0].y + dy
    };

    if(
        head.x < 0 ||
        head.x >= tileCount ||
        head.y < 0 ||
        head.y >= tileCount
    ){
        gameOver();
        return;
    }

    for(let i=0;i<snake.length;i++){

        if(
            snake[i].x===head.x &&
            snake[i].y===head.y
        ){
            gameOver();
            return;
        }
    }

    snake.unshift(head);

    if(
        head.x===food.x &&
        head.y===food.y
    ){

        score += 10;

        if(score > bestScore){

            bestScore = score;

            localStorage.setItem(
                "snake_best",
                bestScore
            );

            bestEl.textContent =
            bestScore;
        }

        gameSpeed =
        Math.max(
            50,
            gameSpeed - 3
        );

        generateFood();

    }else{

        snake.pop();
    }

    updateStats();
}

function draw(){

    drawBackground();
    drawFood();
    drawSnake();
}

function gameOver(){

    gameEnded = true;

    document.getElementById(
        "gameOver"
    ).style.display = "flex";
}

function restartGame(){

    resetGame();
}

document.addEventListener(
"keydown",
e=>{

    if(gameEnded) return;

    if(
        e.key.toLowerCase()==="p"
    ){
        paused = !paused;
        return;
    }

    if(paused) return;

    if(
        e.key==="ArrowUp" &&
        dy!==1
    ){
        dx=0;
        dy=-1;
    }

    if(
        e.key==="ArrowDown" &&
        dy!==-1
    ){
        dx=0;
        dy=1;
    }

    if(
        e.key==="ArrowLeft" &&
        dx!==1
    ){
        dx=-1;
        dy=0;
    }

    if(
        e.key==="ArrowRight" &&
        dx!==-1
    ){
        dx=1;
        dy=0;
    }
});

let lastTime = 0;

function loop(timestamp){

    if(!gameEnded){

        if(
            !lastTime ||
            timestamp-lastTime > gameSpeed
        ){

            if(!paused){

                moveSnake();
                draw();
            }

            lastTime = timestamp;
        }

        requestAnimationFrame(loop);
    }
}

resetGame();
draw();
requestAnimationFrame(loop);

</script>

</body>
</html>
